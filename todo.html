<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASKS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0c;
    --surface: #111116;
    --border: #1e1e28;
    --accent: #c8f135;
    --accent2: #4f46e5;
    --text: #e8e8f0;
    --muted: #4a4a5e;
    --done: #2a2a38;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  header {
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease both;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 52px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .stats {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
  }

  /* Input area */
  .input-wrap {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]::placeholder { color: var(--muted); }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,241,53,0.08);
  }

  .add-btn {
    background: var(--accent);
    border: none;
    border-radius: 12px;
    width: 50px;
    height: 50px;
    cursor: pointer;
    font-size: 22px;
    color: #0a0a0c;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }

  .add-btn:hover { transform: scale(1.08); }
  .add-btn:active { transform: scale(0.95); opacity: 0.85; }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    animation: fadeDown 0.6s 0.2s ease both;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0c;
    font-weight: 600;
  }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: slideIn 0.3s ease both;
    transition: border-color 0.2s, background 0.2s;
  }

  .task:hover { border-color: #2e2e40; }

  .task.done {
    background: var(--done);
    border-color: transparent;
  }

  .check-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }

  .task.done .check-btn {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-btn::after {
    content: '✓';
    font-size: 12px;
    color: #0a0a0c;
    opacity: 0;
    transition: opacity 0.15s;
    font-weight: 700;
  }

  .task.done .check-btn::after { opacity: 1; }

  .task-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
    transition: color 0.2s, text-decoration 0.2s;
  }

  .task.done .task-text {
    color: var(--muted);
    text-decoration: line-through;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    line-height: 1;
  }

  .task:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #ff5f5f; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    animation: fadeDown 0.4s ease both;
  }

  .empty-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty p { font-size: 13px; line-height: 1.6; }

  /* Clear done button */
  .clear-btn {
    display: none;
    margin-top: 20px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .clear-btn:hover { color: #ff5f5f; border-color: #ff5f5f; }
  .clear-btn.visible { display: block; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="label">// din lista</div>
    <h1>TASK<span>S</span></h1>
    <div class="stats" id="stats">0 uppgifter</div>
  </header>

  <div class="input-wrap">
    <input type="text" id="taskInput" placeholder="Lägg till uppgift..." maxlength="120">
    <button class="add-btn" onclick="addTask()">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Alla</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Aktiva</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Klara</button>
  </div>

  <div class="task-list" id="taskList"></div>
  <button class="clear-btn" id="clearBtn" onclick="clearDone()">Rensa klara uppgifter</button>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter = 'all';

  const input = document.getElementById('taskInput');
  const list = document.getElementById('taskList');
  const stats = document.getElementById('stats');
  const clearBtn = document.getElementById('clearBtn');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  function addTask() {
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, done: false });
    input.value = '';
    save();
    render();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    save();
    render();
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  }

  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function render() {
    const filtered = tasks.filter(t =>
      filter === 'all' ? true :
      filter === 'active' ? !t.done :
      t.done
    );

    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    stats.textContent = total === 0 ? '0 uppgifter' :
      `${done}/${total} klara`;

    clearBtn.classList.toggle('visible', tasks.some(t => t.done));

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">${filter === 'done' ? '🎉' : '✦'}</div>
          <p>${filter === 'done' ? 'Inga klara uppgifter ännu.' : filter === 'active' ? 'Inga aktiva uppgifter.' : 'Lägg till din första uppgift ovan.'}</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task ${t.done ? 'done' : ''}" id="task-${t.id}">
        <button class="check-btn" onclick="toggle(${t.id})"></button>
        <span class="task-text">${escHtml(t.text)}</span>
        <button class="delete-btn" onclick="remove(${t.id})">✕</button>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  render();
</script>
</body>
</html>
